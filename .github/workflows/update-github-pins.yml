name: Update GitHub pinned repositories

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-github-pins
  cancel-in-progress: true

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch pinned repositories
        run: npm run fetch:github-pins
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit project data
        run: |
          if git diff --quiet projects.json; then
            echo "No pinned repository changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "Update GitHub pinned repositories"
          git push
